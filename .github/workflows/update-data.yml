name: Update Cricket Club Data

on:
  schedule:
    # Runs twice a day (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    # Allows manual runs from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Stats Scraper
        run: node scripts/scrape_stats.js

      - name: Run Matches Scraper
        run: node scripts/scrape_matches.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/players.json data/matches.json public/data/players.json public/data/matches.json
          
          if git diff --staged --quiet; then
            echo "No changes in scraped data."
          else
            git commit -m "Auto-update matches and player stats from NCU [skip ci]"
            git push
          fi
