name: Update Website Data

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab or Admin Console
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci || npm install
      
    - name: Run Web Scrapers
      run: |
        node scripts/scrape_matches.js
        node scripts/scrape_stats.js
      
    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/matches.json data/players.json public/data/matches.json public/data/players.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update matches and statistics data from NV Play" && git push)
